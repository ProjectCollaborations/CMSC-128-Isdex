name: isdex
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.2
  firebase_database: ^12.0.3
  flutter_svg: ^2.0.0
  flutter_map: ^6.2.0
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  geolocator: ^13.0.0
  intl: ^0.19.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/isdex_logo.png"  # Use the same path
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/isdex_logo.png"  # Same path

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/fish/
